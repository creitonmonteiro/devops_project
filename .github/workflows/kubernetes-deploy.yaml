name: Kubernetes Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  K8S_NAMESPACE: task-manager
  SECRET_NAME: task-manager-secrets
  ENV_FILE: .env.k8s
  DATABASE_SCHEME: postgresql+psycopg
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: '5432'
  POSTGRES_DB: taskmanager
  POSTGRES_USER: taskmanager
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: '30'

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - minikube
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Validate local cluster access
        shell: bash
        run: |
          kubectl version --client
          kubectl config current-context
          kubectl cluster-info

      - name: Create Kubernetes env file
        shell: bash
        env:
          ENV_K8S: ${{ secrets.ENV_K8S }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          if [ -n "$ENV_K8S" ]; then
            echo "$ENV_K8S" > "$ENV_FILE"
            if [ ! -s "$ENV_FILE" ]; then
              echo "Erro: Arquivo $ENV_FILE nao foi criado corretamente."
              exit 1
            fi
            exit 0
          fi

          if [ -z "$SECRET_KEY" ] || [ -z "$POSTGRES_PASSWORD" ]; then
            echo "Erro: Defina o secret ENV_K8S com o conteudo do arquivo .env.k8s ou cadastre os secrets obrigatorios: SECRET_KEY e POSTGRES_PASSWORD."
            exit 1
          fi

          DATABASE_URL="$DATABASE_SCHEME://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB"

          cat > "$ENV_FILE" << EOF
          DATABASE_URL=$DATABASE_URL
          SECRET_KEY=$SECRET_KEY
          ALGORITHM=$ALGORITHM
          ACCESS_TOKEN_EXPIRE_MINUTES=$ACCESS_TOKEN_EXPIRE_MINUTES
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          EOF

          if [ ! -s "$ENV_FILE" ]; then
            echo "Erro: Arquivo $ENV_FILE nao foi criado corretamente."
            exit 1
          fi

      - name: Deploy stack
        shell: bash
        run: |
          bash scripts/apply-dev-stack.sh --namespace "$K8S_NAMESPACE" --secret-name "$SECRET_NAME" --env-file "$ENV_FILE"

      - name: Show cluster state
        if: always()
        shell: bash
        run: |
          kubectl get namespace "$K8S_NAMESPACE" || true
          kubectl get jobs,pods,svc,deploy -n "$K8S_NAMESPACE" || true