name: Kubernetes Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

env:
  K8S_NAMESPACE: task-manager
  SECRET_NAME: task-manager-secrets
  ENV_FILE: .env.k8s

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.kube"

          if [[ -n "${KUBE_CONFIG:-}" ]]; then
            printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          elif [[ -n "${KUBE_CONFIG_B64:-}" ]]; then
            printf '%s' "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          else
            echo "Defina KUBE_CONFIG ou KUBE_CONFIG_B64 nos secrets do repositório." >&2
            exit 1
          fi

          write_secret_file() {
            target_file=$1
            raw_value=$2
            b64_value=$3

            if [[ -n "$raw_value" ]]; then
              printf '%s' "$raw_value" > "$target_file"
              return 0
            fi

            if [[ -n "$b64_value" ]]; then
              printf '%s' "$b64_value" | base64 -d > "$target_file"
              return 0
            fi

            return 1
          }

          current_context=$(kubectl config current-context)
          cluster_name=$(kubectl config view -o jsonpath="{.contexts[?(@.name=='$current_context')].context.cluster}")
          user_name=$(kubectl config view -o jsonpath="{.contexts[?(@.name=='$current_context')].context.user}")

          if write_secret_file "$HOME/.kube/ca.crt" "${KUBE_CA_CRT:-}" "${KUBE_CA_CRT_B64:-}"; then
            kubectl config set-cluster "$cluster_name" \
              --certificate-authority="$HOME/.kube/ca.crt" \
              --embed-certs=true >/dev/null
          fi

          client_cert_written=0
          client_key_written=0

          if write_secret_file "$HOME/.kube/client.crt" "${KUBE_CLIENT_CERT:-}" "${KUBE_CLIENT_CERT_B64:-}"; then
            client_cert_written=1
          fi

          if write_secret_file "$HOME/.kube/client.key" "${KUBE_CLIENT_KEY:-}" "${KUBE_CLIENT_KEY_B64:-}"; then
            client_key_written=1
          fi

          if [[ "$client_cert_written" -eq 1 && "$client_key_written" -eq 1 ]]; then
            kubectl config set-credentials "$user_name" \
              --client-certificate="$HOME/.kube/client.crt" \
              --client-key="$HOME/.kube/client.key" \
              --embed-certs=true >/dev/null
          fi

          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl cluster-info

      - name: Create Kubernetes env file
        shell: bash
        env:
          ENV_K8S: ${{ secrets.ENV_K8S }}
        run: |
          set -euo pipefail

          if [[ -z "${ENV_K8S:-}" ]]; then
            echo "Defina o secret ENV_K8S com o conteudo do arquivo .env.k8s." >&2
            exit 1
          fi

          printf '%s\n' "$ENV_K8S" > "$ENV_FILE"
          test -s "$ENV_FILE"

      - name: Make deploy scripts executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/apply-dev-secrets.sh scripts/apply-dev-stack.sh

      - name: Deploy stack
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/apply-dev-stack.sh \
            --namespace "$K8S_NAMESPACE" \
            --secret-name "$SECRET_NAME" \
            --env-file "$ENV_FILE"

      - name: Show cluster state
        if: always()
        shell: bash
        run: |
          set +e
          kubectl get namespace "$K8S_NAMESPACE"
          kubectl get jobs,pods,svc,deploy -n "$K8S_NAMESPACE"