name: Kubernetes Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  K8S_NAMESPACE: task-manager
  SECRET_NAME: task-manager-secrets
  ENV_FILE: .env.k8s
  KUBECTL_BIN: kubectl.exe
  DATABASE_SCHEME: postgresql+psycopg
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: '5432'
  POSTGRES_DB: taskmanager
  POSTGRES_USER: taskmanager
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: '30'

jobs:
  deploy:
    runs-on:
      - self-hosted
      - windows
      - minikube
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Resolve Git Bash
        shell: powershell
        run: |
          $git = (Get-Command git -ErrorAction Stop).Source
          $gitCmdDir = Split-Path $git -Parent
          $gitRoot = Split-Path $gitCmdDir -Parent
          $bash = Join-Path $gitRoot 'bin/bash.exe'

          if (-not (Test-Path $bash)) {
            throw "Git Bash not found at $bash"
          }

          "GIT_BASH=$bash" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate local cluster access
        shell: powershell
        run: |
          kubectl version --client
          kubectl config current-context
          kubectl cluster-info

      - name: Create Kubernetes env file
        shell: powershell
        env:
          ENV_K8S: ${{ secrets.ENV_K8S }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)

          if (-not [string]::IsNullOrWhiteSpace($env:ENV_K8S)) {
            [System.IO.File]::WriteAllText($env:ENV_FILE, $env:ENV_K8S, $utf8NoBom)

            if (-not (Test-Path $env:ENV_FILE) -or (0 -eq (Get-Item $env:ENV_FILE).Length)) {
              throw "Arquivo $env:ENV_FILE nao foi criado corretamente."
            }

            exit 0
          }

          $requiredSecrets = @{
            SECRET_KEY = $env:SECRET_KEY
            POSTGRES_PASSWORD = $env:POSTGRES_PASSWORD
          }

          $missingSecrets = $requiredSecrets.GetEnumerator() |
            Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } |
            Select-Object -ExpandProperty Key

          if ($missingSecrets) {
            throw "Defina o secret ENV_K8S com o conteudo do arquivo .env.k8s ou cadastre os secrets obrigatorios: $($missingSecrets -join ', ')."
          }

          $encodedPostgresUser = [uri]::EscapeDataString($env:POSTGRES_USER)
          $encodedPostgresPassword = [uri]::EscapeDataString($env:POSTGRES_PASSWORD)
          $databaseUrl = "{0}://{1}:{2}@{3}:{4}/{5}" -f `
            $env:DATABASE_SCHEME,
            $encodedPostgresUser,
            $encodedPostgresPassword,
            $env:POSTGRES_HOST,
            $env:POSTGRES_PORT,
            $env:POSTGRES_DB

          $envLines = @(
            "DATABASE_URL=$databaseUrl"
            "SECRET_KEY=$env:SECRET_KEY"
            "ALGORITHM=$env:ALGORITHM"
            "ACCESS_TOKEN_EXPIRE_MINUTES=$env:ACCESS_TOKEN_EXPIRE_MINUTES"
            "POSTGRES_DB=$env:POSTGRES_DB"
            "POSTGRES_USER=$env:POSTGRES_USER"
            "POSTGRES_PASSWORD=$env:POSTGRES_PASSWORD"
          )

          [System.IO.File]::WriteAllLines($env:ENV_FILE, $envLines, $utf8NoBom)

          if (-not (Test-Path $env:ENV_FILE) -or (0 -eq (Get-Item $env:ENV_FILE).Length)) {
            throw "Arquivo $env:ENV_FILE nao foi criado corretamente."
          }

      - name: Deploy stack
        shell: powershell
        run: |
          & $env:GIT_BASH --noprofile --norc -e -o pipefail scripts/apply-dev-stack.sh --namespace "$env:K8S_NAMESPACE" --secret-name "$env:SECRET_NAME" --env-file "$env:ENV_FILE"

      - name: Show cluster state
        if: always()
        shell: powershell
        run: |
          kubectl get namespace "$env:K8S_NAMESPACE"
          if ($LASTEXITCODE -ne 0) {
            exit 0
          }

          kubectl get jobs,pods,svc,deploy -n "$env:K8S_NAMESPACE"