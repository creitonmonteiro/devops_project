apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-app
  namespace: task-manager
  labels:
    app: task-manager-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: task-manager-app
  template:
    metadata:
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: /metrics
        prometheus.io/port: '8000'
      labels:
        app: task-manager-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: task-manager-app
          image: creitonmonteiro/task_manager_app:latest
          imagePullPolicy: IfNotPresent
          command:
            - poetry
            - run
            - uvicorn
            - --host
            - 0.0.0.0
            - --port
            - '8000'
            - task_manager.app:app
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-app-service
  namespace: task-manager
spec:
  type: NodePort
  selector:
    app: task-manager-app
  ports:
    - port: 8000
      targetPort: 8000