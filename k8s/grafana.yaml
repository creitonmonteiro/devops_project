apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: task-manager
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        jsonData:
          timeInterval: 15s

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: task-manager
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: TaskManager
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-json
  namespace: task-manager
data:
  task_manager.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["task-manager"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timezone": "browser",
      "title": "Task Manager - Prometheus",
      "uid": "task-manager-prometheus",
      "version": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Prometheus UP",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{job=\"prometheus\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "Series no TSDB",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "prometheus_tsdb_head_series",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "Amostras no ultimo scrape",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "scrape_samples_scraped{job=\"prometheus\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "Memoria RSS (processo)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_resident_memory_bytes{job=\"prometheus\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "timeseries",
          "title": "Amostras anexadas ao TSDB / s",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "showPoints": "never"
              }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(prometheus_tsdb_head_samples_appended_total[5m])",
              "legendFormat": "samples/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Duracao do scrape (seg)",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "showPoints": "never"
              }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "scrape_duration_seconds{job=\"prometheus\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Node Exporter UP",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 13 },
          "id": 7,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{job=\"node_exporter\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "CPU do nó (uso %)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 13 },
          "id": 8,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{job=\"node_exporter\",mode=\"idle\"}[5m])))",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "min": 0, "max": 100 } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "RAM do nó em uso",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 13 },
          "id": 9,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "node_memory_MemTotal_bytes{job=\"node_exporter\"} - node_memory_MemAvailable_bytes{job=\"node_exporter\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
