apiVersion: batch/v1
kind: Job
metadata:
  name: task-manager-migrate
  namespace: task-manager
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: task-manager-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: creitonmonteiro/task_manager_app:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              poetry run alembic upgrade head
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: POSTGRES_HOST
              value: postgres-service
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: POSTGRES_PASSWORD