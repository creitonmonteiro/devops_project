apiVersion: batch/v1
kind: Job
metadata:
  name: task-manager-migrate
  namespace: task-manager
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: task-manager-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Aguardando PostgreSQL ficar pronto..."
              for i in $(seq 1 30); do
                if nc -z postgres-service 5432; then
                  echo "PostgreSQL está pronto!"
                  exit 0
                fi
                echo "Tentativa $i de 30 - aguardando..."
                sleep 2
              done
              echo "Timeout esperando PostgreSQL"
              exit 1
      containers:
        - name: migrate
          image: creitonmonteiro/task_manager_app:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Iniciando migration..."
              poetry run alembic upgrade head
              echo "Migration concluída com sucesso!"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: POSTGRES_HOST
              value: postgres-service
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: POSTGRES_PASSWORD